<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pikachu UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">

    <!-- Left Side -->
    <div class="left">

      <img class="logo"
        src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pokémon_logo.svg"
        alt="pokemon">

      <p class="small-title">POKEMON GEN I</p>

      <h1>Pikachu</h1>

      <p class="desc">
        Pikachu is an Electric-type Pokémon introduced in Generation I.
        Pikachu are small, chubby and cute mouse-like Pokémon.
      </p>

      <div class="count">
        <span>01 / 08</span>
      </div>

    </div>

    <!-- Right Side -->
    <div class="right">

      <div class="menu">☰</div>

      <div class="dots">
        <span class="active"></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>

    <!-- Pikachu Image -->
    <img class="pikachu"
      src="./pokemon_PNG93.png"
      alt="pikachu">

  </div>

</body>
</html>
